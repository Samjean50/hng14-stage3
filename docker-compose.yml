networks:
  hng-network:
    driver: bridge

volumes:
  HNG-nginx-logs:
    driver: local
  nextcloud-data:
    driver: local

services:

  nextcloud:
    image: kefaslungu/hng-nextcloud
    networks:
      - hng-network
    volumes:
      - nextcloud-data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    networks:
      - hng-network
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud
    restart: unless-stopped

  detector:
    build: ./detector
    networks:
      - hng-network
    ports:
      - "8080:8080"
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
    cap_add:
      - NET_ADMIN    # needed to run iptables commands
    restart: unless-stopped
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}

